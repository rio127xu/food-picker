<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fanny Food Battle</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">

    <section class="hero-card">
      <p class="eyebrow">Fanny Food Battle</p>
      <h1>今天吃什么</h1>
      <p class="intro">选择偏好后，我们帮你快速做决定。</p>
    </section>

    <section class="panel" aria-live="polite">
      <div class="progress" aria-label="progress">
        <span class="progress-dot active" data-step-dot="0"></span>
        <span class="progress-dot" data-step-dot="1"></span>
        <span class="progress-dot" data-step-dot="2"></span>
      </div>

      <div id="questionArea"></div>
      <div id="resultArea" class="result-area hidden"></div>
    </section>

  </main>

  <script src="script.js" defer></script>
</body>
</html>
