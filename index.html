<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fanny Food Battle</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

    <header class="header">
        <img src="fanny.jpg" class="avatar">
        <h1>Fanny Food Battle</h1>
    </header>

    <div class="step-bar">
        <div class="step active">1</div>
        <div class="step">2</div>
        <div class="step">3</div>
        <div class="step">🏆</div>
    </div>

    <main>

        <div id="setup" class="panel">

            <h2 id="stepTitle">选择想吃的分类</h2>

            <div id="options" class="options"></div>

            <button id="nextBtn">下一步</button>

        </div>

        <div id="battle" class="battle hidden">

            <div class="card" id="cardA"></div>

            <div class="vs">VS</div>

            <div class="card" id="cardB"></div>

        </div>

        <div id="result" class="result hidden">
            <h2>🏆 今日胜者</h2>
            <div id="winner"></div>
        </div>

    </main>

</div>

<script src="script.js"></script>
</body>
</html>
